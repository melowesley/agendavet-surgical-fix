<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Modelo 15: Golden Touch</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Outfit:wght@300&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fff; }
        .serif { font-family: 'Playfair Display', serif; }
        .page { height: 29.7cm; width: 21cm; background: white; margin: 0 auto; display: flex; flex-direction: column; border: 1px solid #fef3c7; }
    </style>
</head>
<body>
    <div class='page'>
        <header class='p-20 border-b border-amber-200 bg-emerald-50/20'>
            <div class='flex justify-between items-end'>
                <div class='max-w-md'>
                    <h1 class='serif text-6xl text-emerald-900 mb-2 italic'>The Royal Vet</h1>
                    <p class='text-amber-700 italic text-md font-light tracking-wide'>Luxury Clinic & Wellness Center · <span class='uppercase font-bold text-[10px] text-emerald-800 tracking-widest'>Powered by AgendaVet</span></p>
                </div>
                <div class='text-right border-l border-amber-200 pl-10'>
                    <p class='text-[9px] tracking-widest text-emerald-900 uppercase font-black'>MASTER GOLD PARTNER</p>
                    <p class='text-amber-600 text-[8px] uppercase mt-1'>Exclusive Excellence</p>
                </div>
            </div>
        </header>
        <main class='flex-1 p-20 text-slate-400 italic text-2xl font-light font-serif'>
            A nobreza no cuidado veterinário...
        </main>
        <footer class='p-20 pt-10 border-t border-amber-50 text-center'>
            <div class='text-amber-200 text-3xl mb-4'>💎</div>
            <p class='text-[8px] uppercase tracking-[0.8em] text-slate-300'>The AgendaVet Collection</p>
        </footer>
    </div>
</body>
</html>
