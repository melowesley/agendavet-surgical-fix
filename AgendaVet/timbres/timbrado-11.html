<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Modelo 11: Minimalist Studio</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300&display=swap' rel='stylesheet'>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fff; }
        .serif { font-family: 'Playfair Display', serif; }
        .page { height: 29.7cm; width: 21cm; background: white; margin: 0 auto; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class='page'>
        <header class='p-32 pb-20 text-center transition-all hover:scale-105 duration-700'>
            <div class='mb-12 opacity-10 text-8xl grayscale select-none'>🐾</div>
            <h1 class='serif text-8xl text-slate-900 leading-none lowercase tracking-tighter mb-4'>studio v.</h1>
            <p class='text-emerald-500 tracking-[1.2em] uppercase text-[9px] font-light'>High-End Aesthetic Veterinary</p>
            <div class='mt-16 w-16 h-[1px] bg-slate-200 mx-auto'></div>
        </header>
        <main class='flex-1 px-32 text-slate-300 italic text-xl font-light text-center leading-relaxed'>
            Pureza e simplicidade no detalhe clínico.
        </main>
        <footer class='p-32 pt-0 text-center opacity-20'>
            <p class='text-[8px] tracking-[0.5em] uppercase'>AgendaVet Signature Series</p>
        </footer>
    </div>
</body>
</html>
